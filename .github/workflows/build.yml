name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dotnet-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Android workload
        run: dotnet workload install android

      # Native AOT Release: publish with RID (plain publish without -r can fail MSB3030 on RingController.so).
      - name: Publish (Release, android-arm64)
        run: dotnet publish src/RingController/RingController.csproj -c Release -f net10.0-android -r android-arm64

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: com.cysharp.RingController-Signed
          path: src/RingController/bin/Release/net10.0-android/com.cysharp.RingController-Signed.apk
          if-no-files-found: error
