name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dotnet-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Android workload
        run: dotnet workload install android

      # DebugType=none: avoids MSB4096 in Microsoft.Android.Sdk.AssemblyResolution.targets (_PrepareAssemblies)
      # when ResolvedSymbols items lack DestinationSubPath (CoreCLR / non-trimmed Release builds); CI only needs compile verification.
      - name: Build
        run: dotnet build src/RingController/RingController.csproj -c Release -p:DebugType=none
